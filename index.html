<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日文學習旗艦版</title>
    <style>
        :root {
            --primary: #4a90e2; --success: #2ecc71; --bg: #ebf2f6; --text: #2c3e50;
            --nav-bg: #f8f9fa; --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 80px; }

        /* 頂部進度條 */
        .progress-bar { position: fixed; top: 0; left: 0; width: 0%; height: 6px; background: var(--success); z-index: 1000; transition: width 0.3s; }

        header { text-align: center; padding: 20px 0; font-weight: bold; font-size: 1.1rem; }

        .app-container { padding: 0 20px; display: flex; justify-content: center; min-height: 80vh; align-items: center; }

        /* 測驗卡片容器 */
        .main-card {
            background: white; border-radius: 30px; width: 100%; max-width: 450px;
            padding: 40px 25px; box-shadow: var(--card-shadow); text-align: center;
            position: relative;
        }

        /* 題目日文文字 (截圖中的明後日) */
        .quiz-question { font-size: 2.5rem; color: var(--primary); font-weight: bold; margin-bottom: 10px; }

        /* 喇叭按鈕樣式 */
        .audio-btn {
            background: #f0f7ff; border: none; width: 50px; height: 50px;
            border-radius: 50%; font-size: 1.5rem; color: var(--primary);
            cursor: pointer; margin-bottom: 25px; transition: 0.2s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .audio-btn:hover { background: #e1f0ff; transform: scale(1.1); }
        .audio-btn:active { transform: scale(0.9); }

        /* 選項按鈕 (截圖樣式) */
        .option-btn {
            display: block; width: 100%; padding: 18px; margin-bottom: 12px;
            background: white; border: 1px solid #eee; border-radius: 18px;
            font-size: 1.1rem; text-align: left; cursor: pointer; transition: 0.2s;
            box-sizing: border-box; font-weight: 500; padding-left: 25px;
        }
        .option-btn:hover { background: #f9f9f9; transform: translateX(5px); }
        .option-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .option-btn.wrong { background: #e74c3c !important; color: white !important; border-color: #e74c3c; }

        /* 底部導覽 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid #ddd; z-index: 999;
        }
        .nav-item { text-align: center; flex: 1; cursor: pointer; color: #7f8c8d; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .nav-label { font-size: 0.75rem; font-weight: bold; }

        .page { display: none; width: 100%; }
        .page.active { display: block; }

        .next-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="progress-bar" id="top-progress"></div>

<header>測驗模式</header>

<div class="app-container">
    <div id="page-quiz" class="page active">
        <div class="main-card">
            <div class="quiz-question" id="quiz-q">...</div>
            
            <button class="audio-btn" onclick="playQuizAudio()">🔊</button>
            
            <div id="quiz-options">
                </div>
            <button id="quiz-next" class="next-btn" style="display:none" onclick="startNewQuiz()">下一題</button>
        </div>
    </div>

    <div id="page-study" class="page"><div class="main-card">學習模式內容</div></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="switchPage('study')"><span class="nav-icon">📚</span><span class="nav-label">學習</span></div>
    <div class="nav-item active" onclick="switchPage('quiz')"><span class="nav-icon">📝</span><span class="nav-label">測驗</span></div>
    <div class="nav-item"><span class="nav-icon">🔍</span><span class="nav-label">列表</span></div>
    <div class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">統計</span></div>
</div>

<script>
    // 預設資料
    let vocabData = JSON.parse(localStorage.getItem('vocab_v_final')) || [
        { kana: "あした", kanji: "明日", zh: "明天" },
        { kana: "あさって", kanji: "明後日", zh: "後天" },
        { kana: "あたま", kanji: "頭", zh: "腳" }, // 故意放截圖裡的選項
        { kana: "アイスクリーム", kanji: "", zh: "冰淇淋" },
        { kana: "あき", kanji: "秋", zh: "秋" }
    ];

    let quizWord = null;
    let jpVoice = null;

    // 初始化語音
    function initVoice() {
        const voices = window.speechSynthesis.getVoices();
        jpVoice = voices.find(v => v.lang === 'ja-JP' || v.lang === 'ja_JP') || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = initVoice;

    function playQuizAudio() {
        if (!quizWord) return;
        const utterance = new SpeechSynthesisUtterance(quizWord.kana);
        if (jpVoice) utterance.voice = jpVoice;
        utterance.lang = 'ja-JP';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    // 開始新題目
    function startNewQuiz() {
        document.getElementById('quiz-next').style.display = 'none';
        document.getElementById('top-progress').style.width = Math.floor(Math.random() * 100) + "%";

        // 選題目 (日文)
        quizWord = vocabData[Math.floor(Math.random() * vocabData.length)];
        document.getElementById('quiz-q').innerText = quizWord.kanji || quizWord.kana;

        // 選 4 個選項 (中文)
        let options = [quizWord.zh];
        while(options.length < 4) {
            let rand = vocabData[Math.floor(Math.random() * vocabData.length)].zh;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);

        // 渲染選項
        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            container.appendChild(btn);
        });

        // 自動播放一次
        setTimeout(playQuizAudio, 500);
    }

    function checkAnswer(btn, selected) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if (selected === quizWord.zh) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            // 標示出正確的那一個
            allBtns.forEach(b => {
                if (b.innerText === quizWord.zh) b.classList.add('correct');
            });
        }
        document.getElementById('quiz-next').style.display = 'block';
    }

    function switchPage(p) {
        // 簡單的分頁切換邏輯
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        if(p === 'quiz') startNewQuiz();
    }

    window.onload = () => {
        initVoice();
        startNewQuiz();
    };
</script>

</body>
</html>
