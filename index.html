<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文單字練習卡</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        /* 翻卡效果 */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 320px;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 30px;
            box-sizing: border-box;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fffef9;
        }

        /* 文字樣式 */
        .kana-text { font-size: 1.2rem; color: #888; margin-bottom: 5px; }
        .kanji-text { font-size: 3rem; font-weight: bold; color: var(--text-color); }
        .zh-text { font-size: 1.8rem; color: var(--primary-color); font-weight: bold; margin-bottom: 15px; }
        .example-box { 
            font-size: 1rem; 
            color: #555; 
            background: #f0f4f8; 
            padding: 12px; 
            border-radius: 12px;
            width: 100%;
        }

        /* 按鈕樣式 */
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button.secondary { background: #adb5bd; }

        .tts-btn {
            background: #ff9800;
            margin-bottom: 20px;
            padding: 10px 30px;
            font-size: 1.1rem;
        }

        #counter { margin-top: 15px; color: #999; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <button class="tts-btn" onclick="speakJP(event)">🔊 朗讀單字</button>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <div class="kana-text" id="front-kana">...</div>
                <div class="kanji-text" id="front-kanji">...</div>
                <div style="margin-top: 20px; font-size: 0.8rem; color: #ccc;">點擊看答案</div>
            </div>
            <div class="card-face card-back">
                <div class="zh-text" id="back-zh">...</div>
                <div class="example-box" id="back-ex">...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="secondary" onclick="prevCard()">上一個</button>
        <button onclick="nextCard()">下一個</button>
        <button class="secondary" onclick="randomCard()">隨機</button>
    </div>
    
    <p id="counter"></p>
</div>

<script>
    // 資料來源：使用你提供的 JSON 陣列
    const vocabData = [
      { "kana": "わたし", "kanji": "私", "chinese": "我", "example": "私は学生です。(我是學生。)" },
      { "kana": "あなた", "kanji": "", "chinese": "你", "example": "あなたは先生ですか。(你是老師嗎？)" },
      { "kana": "あのひと", "kanji": "あの人", "chinese": "那個人", "example": "あの人は医者です。(那個人是醫生。)" },
      { "kana": "あのかた", "kanji": "あの方", "chinese": "那一位(較禮貌)", "example": "あの方は先生です。(那一位是老師。)" },
      { "kana": "しょくぎょう", "kanji": "職業", "chinese": "職業", "example": "職業は何ですか。(職業是什麼？)" },
      { "kana": "かいしゃいん", "kanji": "会社員", "chinese": "職員、上班族", "example": "私は会社員です。(我是上班族。)" },
      { "kana": "しゃいん", "kanji": "社員", "chinese": "~公司的職員", "example": "ユニクロの社員です。(是優衣庫的職員。)" },
      { "kana": "てんいん", "kanji": "店員", "chinese": "店員", "example": "あの人は店員です。(那個人是店員。)" },
      { "kana": "ぎんこういん", "kanji": "銀行員", "chinese": "銀行行員", "example": "私は銀行員じゃありません。(我不是銀行員。)" },
      { "kana": "いしゃ", "kanji": "医者", "chinese": "醫生", "example": "あの人は医者です。(那個人是醫生。)" },
      { "kana": "けんきゅうしゃ", "kanji": "研究者", "chinese": "研究人員", "example": "あなたは研究者ですか。(你是研究人員嗎？)" },
      { "kana": "きょうし", "kanji": "教師", "chinese": "教師", "example": "私は教師です。(我是教師。)" },
      { "kana": "せんせい", "kanji": "先生", "chinese": "老師", "example": "あの方は先生です。(那一位是老師。)" },
      { "kana": "がくせい", "kanji": "学生", "chinese": "學生", "example": "私は学生です。(我是學生。)" },
      { "kana": "エンジニア", "kanji": "", "chinese": "工程師", "example": "あの人はエンジニアです。(那個人是工程師。)" },
      { "kana": "だいがく", "kanji": "大學", "chinese": "大學", "example": "ここは大学です。(這裡是大學。)" },
      { "kana": "びょういん", "kanji": "病院", "chinese": "醫院", "example": "あそこは病院です。(那裡是醫院。)" },
      { "kana": "たいいく", "kanji": "体育", "chinese": "體育", "example": "体育の先生です。(是體育老師。)" },
      { "kana": "アメリカ", "kanji": "", "chinese": "美國", "example": "あの人はアメリカ人です。(那個人是美國人。)" },
      { "kana": "イギリス", "kanji": "", "chinese": "英國", "example": "あの方はイギリス人です。(那一位是英國人。)" },
      { "kana": "イタリア", "kanji": "", "chinese": "義大利", "example": "私はイタリア人じゃありません。(我不是義大利人。)" },
      { "kana": "ドイツ", "kanji": "", "chinese": "德國", "example": "あの人はドイツ人ですか。(那個人是德國人嗎？)" },
      { "kana": "フランス", "kanji": "", "chinese": "法國", "example": "フランスの學生です。(是法國的學生。)" },
      { "kana": "タイ", "kanji": "", "chinese": "泰國", "example": "あの人は泰國人です。(那個人是泰國人。)" },
      { "kana": "にほん", "kanji": "日本", "chinese": "日本", "example": "私は日本人です。(我是日本人。)" },
      { "kana": "かんこく", "kanji": "韓国", "chinese": "韓國", "example": "あなたは韓國人ですか。(你是韓國人嗎？)" },
      { "kana": "ちゅうごく", "kanji": "中国", "chinese": "中國", "example": "中國の大學です。(是中國的大學。)" },
      { "kana": "～じん", "kanji": "～人", "chinese": "～人", "example": "私は台灣人です。(我是台灣人。)" },
      { "kana": "かんさい", "kanji": "関西", "chinese": "關西地區", "example": "關西の大學です。(是關西的大學。)" },
      { "kana": "ユニクロ", "kanji": "", "chinese": "優衣庫 (UNIQLO)", "example": "ユニクロの店員です。(是優衣庫的店員。)" },
      { "kana": "だれ", "kanji": "誰", "chinese": "誰", "example": "あの人は誰ですか。(那個人是誰？)" },
      { "kana": "どなた", "kanji": "", "chinese": "誰 (較禮貌)", "example": "あの方はどなたですか。(那一位是誰？)" },
      { "kana": "なんさい", "kanji": "何歳", "chinese": "幾歲", "example": "あなたは何歳ですか。(你幾歲？)" },
      { "kana": "おいくつ", "kanji": "", "chinese": "幾歲 (較禮貌)", "example": "先生はおいくつですか。(老師您幾歲？)" },
      { "kana": "～さん", "kanji": "", "chinese": "～先生 / 小姐", "example": "林さんは學生です。(林小姐是學生。)" },
      { "kana": "～くん", "kanji": "～君", "chinese": "對同輩、晚輩、下屬的稱呼 (多用於男性)", "example": "佐藤くんは學生です。(佐藤同學是學生。)" },
      { "kana": "～ちゃん", "kanji": "", "chinese": "對親暱的人的稱呼 (多用於小孩或寵物)", "example": "さくらちゃんは５歳です。(小櫻５歲。)" },
      { "kana": "はい", "kanji": "", "chinese": "是", "example": "はい、私は學生です。(是的，我是學生。)" },
      { "kana": "いいえ", "kanji": "", "chinese": "不是", "example": "いいえ、學生じゃありません。(不，我不是學生。)" },
      { "kana": "はじめまして", "kanji": "初めまして", "chinese": "初次見面", "example": "初めまして、私は林です。(初次見面，我是姓林。)" },
      { "kana": "門すみません", "kanji": "", "chinese": "不好意思", "example": "すみません、あの方はどなたですか。(不好意思，請問那一位是誰？)" },
      { "kana": "どうぞ", "kanji": "", "chinese": "請", "example": "どうぞよろしくお願いします。(請多指教。)" },
      { "kana": "よろしくおねがいします", "kanji": "よろしくお願いします", "chinese": "請多指教", "example": "どうぞよろしくお願いします。(請多指教。)" },
      { "kana": "そうです", "kanji": "", "chinese": "沒錯", "example": "はい、そうです。(是的，沒錯。)" },
      { "kana": "ウメだいがく", "kanji": "ウメ大学", "chinese": "梅花大學", "example": "ウメ大學の學生です。(是梅花大學的學生。)" }
    ];

    let currentIndex = 0;
    const card = document.getElementById('card');

    function updateCard() {
        card.classList.remove('is-flipped');
        
        setTimeout(() => {
            const data = vocabData[currentIndex];
            // 正面：如果有漢字就顯示漢字，假名顯示在上方
            document.getElementById('front-kana').innerText = data.kanji ? data.kana : "";
            document.getElementById('front-kanji').innerText = data.kanji ? data.kanji : data.kana;
            
            // 反面
            document.getElementById('back-zh').innerText = data.chinese;
            document.getElementById('back-ex').innerText = data.example;
            
            // 計數器
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${vocabData.length}`;
        }, 150);
    }

    function flipCard() {
        card.classList.toggle('is-flipped');
    }

    function nextCard() {
        currentIndex = (currentIndex + 1) % vocabData.length;
        updateCard();
    }

    function prevCard() {
        currentIndex = (currentIndex - 1 + vocabData.length) % vocabData.length;
        updateCard();
    }

    function randomCard() {
        currentIndex = Math.floor(Math.random() * vocabData.length);
        updateCard();
    }

    function speakJP(event) {
        event.stopPropagation();
        const data = vocabData[currentIndex];
        // 優先朗讀假名
        const textToSpeak = data.kana;
        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = 'ja-JP';
        utterance.rate = 0.8;
        window.speechSynthesis.speak(utterance);
    }

    updateCard();
</script>

</body>
</html>
