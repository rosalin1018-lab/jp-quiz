<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文單字卡 Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --accent-color: #ff9800;
            --text-color: #333;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        /* 分類選擇器 */
        .header-controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        /* 翻卡效果 */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 320px;
            cursor: pointer;
            margin-bottom: 25px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        .card-back { transform: rotateY(180deg); background-color: #fffef9; }

        .kana-text { font-size: 1.2rem; color: #888; }
        .kanji-text { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .zh-text { font-size: 1.8rem; color: var(--primary-color); font-weight: bold; margin-bottom: 15px; }
        .example-box { font-size: 1rem; color: #555; background: #f0f4f8; padding: 12px; border-radius: 12px; width: 100%; }

        /* 按鈕控制區 */
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button.secondary { background: #adb5bd; }
        button.add-btn { background: #4caf50; }
        button.tts-btn { background: var(--accent-color); margin-bottom: 15px; width: 100%; }

        /* 新增單字的彈窗 (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .modal-content input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header-controls">
    <select id="categoryFilter" onchange="filterCategory()">
        <option value="all">全部單字</option>
        <option value="身分">身分職業</option>
        <option value="地點">地點名稱</option>
        <option value="招呼">日常招呼</option>
        <option value="其他">其他</option>
    </select>
    <button class="add-btn" onclick="openModal()">＋ 新增</button>
</div>

<div class="container">
    <button class="tts-btn" onclick="speakJP(event)">🔊 朗讀單字</button>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <div class="kana-text" id="front-kana"></div>
                <div class="kanji-text" id="front-kanji"></div>
            </div>
            <div class="card-face card-back">
                <div class="zh-text" id="back-zh"></div>
                <div class="example-box" id="back-ex"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="secondary" onclick="prevCard()">上一個</button>
        <button onclick="nextCard()">下一個</button>
        <button class="secondary" onclick="randomCard()">隨機</button>
    </div>
    <p id="counter" style="color:#999; margin-top:15px;"></p>
</div>

<div class="modal" id="addModal">
    <div class="modal-content">
        <h3>新增日文單字</h3>
        <input type="text" id="newKana" placeholder="假名 (如: わたし)">
        <input type="text" id="newKanji" placeholder="漢字 (如: 私)">
        <input type="text" id="newZh" placeholder="中文意思">
        <input type="text" id="newEx" placeholder="例句">
        <select id="newCat">
            <option value="其他">選擇分類...</option>
            <option value="身分">身分職業</option>
            <option value="地點">地點名稱</option>
            <option value="招呼">日常招呼</option>
            <option value="其他">其他</option>
        </select>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button style="flex:1" onclick="saveNewVocab()">儲存</button>
            <button style="flex:1" class="secondary" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script>
    // 1. 預設資料 (加入 category 屬性)
    const defaultVocab = [
      { kana: "わたし", kanji: "私", chinese: "我", example: "私は学生です。", category: "身分" },
      { kana: "がくせい", kanji: "学生", chinese: "學生", example: "私は学生です。", category: "身分" },
      { kana: "びょういん", kanji: "病院", chinese: "醫院", example: "あそこは病院です。", category: "地點" },
      { kana: "はじめまして", kanji: "初めまして", chinese: "初次見面", example: "初めまして、林です。", category: "招呼" }
    ];

    let allVocab = [];
    let filteredVocab = [];
    let currentIndex = 0;

    // 2. 初始化：從 localStorage 讀取資料
    function init() {
        const saved = localStorage.getItem('myVocabData');
        if (saved) {
            allVocab = JSON.parse(saved);
        } else {
            allVocab = defaultVocab;
            localStorage.setItem('myVocabData', JSON.stringify(allVocab));
        }
        filterCategory();
    }

    // 3. 分類過濾邏輯
    function filterCategory() {
        const cat = document.getElementById('categoryFilter').value;
        if (cat === 'all') {
            filteredVocab = allVocab;
        } else {
            filteredVocab = allVocab.filter(item => item.category === cat);
        }
        currentIndex = 0;
        updateCard();
    }

    function updateCard() {
        const card = document.getElementById('card');
        card.classList.remove('is-flipped');
        
        if (filteredVocab.length === 0) {
            document.getElementById('front-kanji').innerText = "無資料";
            document.getElementById('front-kana').innerText = "";
            document.getElementById('counter').innerText = "0 / 0";
            return;
        }

        setTimeout(() => {
            const data = filteredVocab[currentIndex];
            document.getElementById('front-kana').innerText = data.kanji ? data.kana : "";
            document.getElementById('front-kanji').innerText = data.kanji ? data.kanji : data.kana;
            document.getElementById('back-zh').innerText = data.chinese;
            document.getElementById('back-ex').innerText = data.example;
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${filteredVocab.length}`;
        }, 150);
    }

    // 4. 單字管理功能
    function openModal() { document.getElementById('addModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('addModal').style.display = 'none'; }

    function saveNewVocab() {
        const newVocab = {
            kana: document.getElementById('newKana').value,
            kanji: document.getElementById('newKanji').value,
            chinese: document.getElementById('newZh').value,
            example: document.getElementById('newEx').value,
            category: document.getElementById('newCat').value
        };

        if (!newVocab.kana || !newVocab.chinese) {
            alert("請至少填寫假名與中文！");
            return;
        }

        allVocab.push(newVocab);
        localStorage.setItem('myVocabData', JSON.stringify(allVocab));
        
        // 清空欄位並關閉
        document.querySelectorAll('.modal-content input').forEach(i => i.value = '');
        closeModal();
        filterCategory();
        alert("儲存成功！");
    }

    // 5. 基礎控制
    function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }
    function nextCard() { currentIndex = (currentIndex + 1) % filteredVocab.length; updateCard(); }
    function prevCard() { currentIndex = (currentIndex - 1 + filteredVocab.length) % filteredVocab.length; updateCard(); }
    function randomCard() { currentIndex = Math.floor(Math.random() * filteredVocab.length); updateCard(); }

    function speakJP(event) {
        event.stopPropagation();
        if (filteredVocab.length === 0) return;
        const utterance = new SpeechSynthesisUtterance(filteredVocab[currentIndex].kana);
        utterance.lang = 'ja-JP';
        window.speechSynthesis.speak(utterance);
    }

    init();
</script>

</body>
</html>
