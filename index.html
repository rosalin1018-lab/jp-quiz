<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日文學習旗艦版 Pro</title>
    <style>
        :root {
            --primary: #4a90e2; 
            --success: #2ecc71; 
            --bg: #ebf2f6; 
            --text: #2c3e50;
            --nav-bg: #f8f9fa; 
            --card-bg: #ffffff;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body { 
            font-family: -apple-system, "Noto Sans CJK TC", sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* 頂部狀態列 - 確保在電腦上顏色鮮明 */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 2000;
            background: #ffffff; border-bottom: 2px solid #e1e8ed;
        }
        .progress-bar { width: 0%; height: 6px; background: var(--success); transition: 0.3s; }
        .settings-row {
            display: flex; justify-content: space-around; padding: 12px;
            font-size: 0.9rem; font-weight: bold; color: #57606f;
        }

        header { text-align: center; padding: 100px 0 10px 0; font-weight: bold; font-size: 1.3rem; color: #2f3542; }

        .app-container { padding: 0 20px; display: flex; flex-direction: column; align-items: center; min-height: 60vh; justify-content: center; }

        /* 主卡片樣式 */
        .main-card {
            background: var(--card-bg); border-radius: 35px; width: 100%; max-width: 450px;
            padding: 40px 25px; box-shadow: var(--card-shadow); text-align: center;
            min-height: 320px; display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }

        .quiz-question { font-size: 3rem; color: var(--primary); font-weight: bold; margin-bottom: 15px; }

        /* 喇叭按鈕 */
        .audio-btn {
            background: #f0f7ff; border: none; width: 80px; height: 80px;
            border-radius: 50%; font-size: 2.5rem; color: var(--primary);
            cursor: pointer; margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.1);
        }
        .audio-btn:active { transform: scale(0.9); }

        /* 選項按鈕 */
        .option-btn {
            display: block; width: 100%; padding: 18px; margin-bottom: 12px;
            background: white; border: 1px solid #eee; border-radius: 20px;
            font-size: 1.15rem; text-align: left; cursor: pointer; transition: 0.2s;
            padding-left: 30px; color: var(--primary); font-weight: 500;
        }
        .option-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .option-btn.wrong { background: #ff4757 !important; color: white !important; border-color: #ff4757; }

        /* 切換開關 (Switch) */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; vertical-align: middle; margin-left: 8px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ced6e0; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* 底部導覽欄 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1500;
        }
        .nav-item { text-align: center; flex: 1; cursor: pointer; color: #a4b0be; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
        .nav-label { font-size: 0.8rem; font-weight: bold; }

        .next-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 1rem; }
        .page { display: none; width: 100%; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="progress-bar" id="top-progress"></div>
    <div class="settings-row">
        <span>🎧 聽力測驗 <label class="switch"><input type="checkbox" id="toggle-listening" onchange="toggleSetting('listening')"><span class="slider"></span></label></span>
        <span>👁️ 隱藏漢字 <label class="switch"><input type="checkbox" id="toggle-hide-kanji" onchange="toggleSetting('hideKanji')"><span class="slider"></span></label></span>
    </div>
</div>

<header id="page-title">測驗模式</header>

<div class="app-container">
    <div id="page-quiz" class="page active">
        <div class="main-card">
            <div id="quiz-audio-section">
                <button class="audio-btn" onclick="playQuizAudio()">🔊</button>
                <div id="listening-hint" style="color:#a4b0be; font-style:italic; margin-bottom:20px">聽音辨義...</div>
            </div>
            
            <div class="quiz-question" id="quiz-q"></div>
            
            <div id="quiz-options"></div>
            <button id="quiz-next" class="next-btn" style="display:none" onclick="startNewQuiz()">下一題</button>
        </div>
    </div>

    <div id="page-study" class="page">
        <div class="main-card" onclick="flipStudyCard()">
            <div id="study-kana" style="color:#888; font-size:1.3rem; margin-bottom:10px"></div>
            <div id="study-kanji" style="font-size:3.5rem; font-weight:bold; color:var(--primary)"></div>
            <div id="study-zh" style="display:none; font-size:2.5rem; color:var(--success); margin-top:20px"></div>
        </div>
        <div style="display:flex; gap:12px; margin-top:20px; width:100%; max-width:450px">
            <button class="next-btn" style="background:#bdc3c7" onclick="prevWord()">上一個</button>
            <button class="next-btn" onclick="nextWord()">下一個</button>
        </div>
    </div>
    
    <div id="page-list" class="page"><div class="main-card"><h3>單字列表功能開發中</h3></div></div>
    <div id="page-stats" class="page"><div class="main-card"><h3>學習統計功能開發中</h3></div></div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="switchPage('study')"><span class="nav-icon">📚</span><span class="nav-label">學習</span></div>
    <div class="nav-item active" onclick="switchPage('quiz')"><span class="nav-icon">📝</span><span class="nav-label">測驗</span></div>
    <div class="nav-item" onclick="switchPage('list')"><span class="nav-icon">🔍</span><span class="nav-label">列表</span></div>
    <div class="nav-item" onclick="switchPage('stats')"><span class="nav-icon">📊</span><span class="nav-label">統計</span></div>
</div>

<script>
    let vocabData = JSON.parse(localStorage.getItem('vocab_pro_data_v2')) || [
        { kana: "あした", kanji: "明日", zh: "明天" },
        { kana: "あさって", kanji: "明後日", zh: "後天" },
        { kana: "あたま", kanji: "頭", zh: "頭" },
        { kana: "あき", kanji: "秋", zh: "秋天" },
        { kana: "まがる", kanji: "曲がる", zh: "轉彎" }
    ];

    let currentIndex = 0;
    let quizWord = null;
    let jpVoice = null;

    function initVoice() {
        const voices = window.speechSynthesis.getVoices();
        jpVoice = voices.find(v => v.lang.includes('ja')) || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = initVoice;

    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        if (jpVoice) u.voice = jpVoice;
        u.lang = 'ja-JP'; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    // 持久化開關設定
    function toggleSetting(type) {
        const val = (type === 'listening') ? 
            document.getElementById('toggle-listening').checked : 
            document.getElementById('toggle-hide-kanji').checked;
        localStorage.setItem('cfg_' + type, val);
        refreshView();
    }

    function loadSettings() {
        document.getElementById('toggle-listening').checked = localStorage.getItem('cfg_listening') === 'true';
        document.getElementById('toggle-hide-kanji').checked = localStorage.getItem('cfg_hideKanji') === 'true';
    }

    function startNewQuiz() {
        loadSettings();
        const isListening = document.getElementById('toggle-listening').checked;
        const hideKanji = document.getElementById('toggle-hide-kanji').checked;
        
        document.getElementById('quiz-next').style.display = 'none';
        document.getElementById('top-progress').style.width = Math.floor(Math.random() * 100) + "%";

        quizWord = vocabData[Math.floor(Math.random() * vocabData.length)];

        const audioSection = document.getElementById('quiz-audio-section');
        const questionEl = document.getElementById('quiz-q');
        const hintEl = document.getElementById('listening-hint');

        if (isListening) {
            audioSection.style.display = 'block';
            questionEl.style.display = 'none';
            hintEl.style.display = 'block';
            setTimeout(playQuizAudio, 400);
        } else {
            audioSection.style.display = 'block'; 
            questionEl.style.display = 'block';
            hintEl.style.display = 'none';
            questionEl.innerText = (hideKanji || !quizWord.kanji) ? quizWord.kana : quizWord.kanji;
        }

        let options = [quizWord.zh];
        while(options.length < 4) {
            let r = vocabData[Math.floor(Math.random() * vocabData.length)].zh;
            if(!options.includes(r)) options.push(r);
        }
        options.sort(() => Math.random() - 0.5);

        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);
                if(opt === quizWord.zh) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    btns.forEach(b => { if(b.innerText === quizWord.zh) b.classList.add('correct'); });
                }
                document.getElementById('quiz-next').style.display = 'block';
            };
            container.appendChild(btn);
        });
    }

    function playQuizAudio() { if(quizWord) speak(quizWord.kana); }

    function updateStudyCard() {
        loadSettings();
        const data = vocabData[currentIndex];
        const hideKanji = document.getElementById('toggle-hide-kanji').checked;
        document.getElementById('study-kana').innerText = (data.kanji && !hideKanji) ? data.kana : "";
        document.getElementById('study-kanji').innerText = (hideKanji || !data.kanji) ? data.kana : data.kanji;
        document.getElementById('study-zh').style.display = 'none';
    }

    function flipStudyCard() {
        const zh = document.getElementById('study-zh');
        if(zh.style.display === 'none') {
            zh.innerText = vocabData[currentIndex].zh;
            zh.style.display = 'block';
            speak(vocabData[currentIndex].kana);
        } else { zh.style.display = 'none'; }
    }

    function refreshView() {
        const activePage = document.querySelector('.page.active').id;
        if(activePage === 'page-quiz') startNewQuiz();
        else if(activePage === 'page-study') updateStudyCard();
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nv => nv.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.querySelector(`.nav-item[onclick="switchPage('${p}')"]`).classList.add('active');
        const titles = { study: "📚 學習模式", quiz: "📝 測驗模式", list: "🔍 列表", stats: "📊 統計" };
        document.getElementById('page-title').innerText = titles[p];
        refreshView();
    }

    function nextWord() { currentIndex = (currentIndex + 1) % vocabData.length; updateStudyCard(); }
    function prevWord() { currentIndex = (currentIndex - 1 + vocabData.length) % vocabData.length; updateStudyCard(); }

    window.onload = () => {
        initVoice();
        loadSettings();
        switchPage('quiz');
    };
</script>
</body>
</html>
