<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文單字練習助手</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #27ae60;
            --secondary-color: #f5f7fa;
            --text-color: #333;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 450px;
            padding: 20px;
        }

        /* 頂部進度資訊 */
        .stats {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* 翻卡效果 */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 25px;
            position: relative;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flashcard.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            padding: 20px;
            box-sizing: border-box;
        }

        .card-back { transform: rotateY(180deg); background-color: #fffdf5; }

        /* 熟練度標籤 */
        .mastery-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            display: none;
        }
        .is-mastered .mastery-badge {
            display: block;
            background: var(--success-color);
            color: white;
        }

        .jp-text { font-size: 3rem; font-weight: bold; margin-bottom: 10px; }
        .zh-text { font-size: 1.5rem; color: var(--primary-color); margin-bottom: 15px; }
        .example-text { font-size: 0.9rem; color: #666; line-height: 1.5; padding: 0 10px; }

        /* 按鈕區 */
        .controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }
        button.secondary { background: #6c757d; }
        button.mastery-toggle { background: #f39c12; }
        button.mastery-toggle.active { background: var(--success-color); }

        /* 管理功能區 (匯入/匯出) */
        .admin-zone {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #ccc;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .admin-btn { background: #eee; color: #555; font-size: 0.8rem; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats">
        <span id="counter">0 / 0</span>
        <span id="mastery-count">已掌握: 0</span>
    </div>

    <button class="secondary" style="margin-bottom:15px;" onclick="speakJP(event)">🔊 播放日文語音</button>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <span class="mastery-badge">已掌握 ✔</span>
                <div class="jp-text" id="front-jp">...</div>
                <small style="color: #bbb;">點擊翻面</small>
            </div>
            <div class="card-face card-back">
                <div class="zh-text" id="back-zh">...</div>
                <div class="example-text" id="back-ex">...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="secondary" onclick="prevCard()">上一個</button>
        <button onclick="nextCard()">下一個</button>
        <button class="secondary" onclick="randomCard()">隨機</button>
        <button id="mastery-btn" class="mastery-toggle" onclick="toggleMastery(event)">標記為已掌握</button>
    </div>

    <div class="admin-zone">
        <button class="admin-btn" onclick="exportJSON()">📤 匯出 JSON</button>
        <button class="admin-btn" onclick="document.getElementById('file-input').click()">📥 匯入 JSON</button>
        <input type="file" id="file-input" accept=".json" onchange="importJSON(event)">
        <button class="admin-btn" onclick="resetData()" style="color: #e74c3c;">清空資料</button>
    </div>
</div>

<script>
    // 預設初始單字
    const defaultData = [
        { jp: "食べる", zh: "吃", ex: "りんごを食べます。", mastered: false },
        { jp: "勉強", zh: "學習", ex: "日本語を勉強します。", mastered: false },
        { jp: "楽しい", zh: "快樂的", ex: "旅行はとても楽しかったです。", mastered: false },
        { jp: "貓", zh: "貓", ex: "庭に貓がいます。", mastered: false },
        { jp: "美味しい", zh: "好吃的", ex: "このケーキは美味しいです。", mastered: false }
    ];

    let vocabData = [];
    let currentIndex = 0;
    const card = document.getElementById('card');

    // 1. 初始化資料 (優先從 LocalStorage 讀取)
    function init() {
        const savedData = localStorage.getItem('myFlashcards');
        if (savedData) {
            vocabData = JSON.parse(savedData);
        } else {
            vocabData = defaultData;
            saveToStorage();
        }
        updateCard();
    }

    // 2. 儲存至本地儲存空間
    function saveToStorage() {
        localStorage.setItem('myFlashcards', JSON.stringify(vocabData));
        const mastered = vocabData.filter(item => item.mastered).length;
        document.getElementById('mastery-count').innerText = `已掌握: ${mastered}`;
    }

    // 3. 更新卡片 UI
    function updateCard() {
        card.classList.remove('is-flipped');
        
        const data = vocabData[currentIndex];
        
        // 更新熟練度外觀
        if (data.mastered) {
            card.classList.add('is-mastered');
            document.getElementById('mastery-btn').innerText = "取消掌握標記";
            document.getElementById('mastery-btn').classList.add('active');
        } else {
            card.classList.remove('is-mastered');
            document.getElementById('mastery-btn').innerText = "標記為已掌握";
            document.getElementById('mastery-btn').classList.remove('active');
        }

        setTimeout(() => {
            document.getElementById('front-jp').innerText = data.jp;
            document.getElementById('back-zh').innerText = data.zh;
            document.getElementById('back-ex').innerText = data.ex;
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${vocabData.length}`;
        }, 150);
    }

    // 4. 功能邏輯
    function flipCard() { card.classList.toggle('is-flipped'); }
    function nextCard() { currentIndex = (currentIndex + 1) % vocabData.length; updateCard(); }
    function prevCard() { currentIndex = (currentIndex - 1 + vocabData.length) % vocabData.length; updateCard(); }
    function randomCard() { currentIndex = Math.floor(Math.random() * vocabData.length); updateCard(); }

    function toggleMastery(event) {
        event.stopPropagation(); // 防止翻轉卡片
        vocabData[currentIndex].mastered = !vocabData[currentIndex].mastered;
        saveToStorage();
        updateCard();
    }

    function speakJP(event) {
        event.stopPropagation();
        const utterance = new SpeechSynthesisUtterance(vocabData[currentIndex].jp);
        utterance.lang = 'ja-JP';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    // 5. 匯出/匯入 JSON
    function exportJSON() {
        const dataStr = JSON.stringify(vocabData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = "my_japanese_vocab.json";
        link.click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    vocabData = importedData;
                    currentIndex = 0;
                    saveToStorage();
                    updateCard();
                    alert("匯入成功！");
                }
            } catch (err) {
                alert("檔案格式錯誤，請確保是正確的 JSON 格式。");
            }
        };
        reader.readAsText(file);
    }

    function resetData() {
        if (confirm("確定要清空所有進度並恢復預設嗎？")) {
            localStorage.removeItem('myFlashcards');
            vocabData = [...defaultData];
            currentIndex = 0;
            saveToStorage();
            updateCard();
        }
    }

    init();
</script>

</body>
</html>
