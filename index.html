<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日文學習旗艦版 Pro</title>
    <style>
        :root {
            --primary: #4a90e2; --success: #2ecc71; --bg: #ebf2f6; --text: #2c3e50;
            --nav-bg: #f8f9fa; --card-bg: #ffffff; --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); 
            margin: 0; color: var(--text); padding-bottom: 90px; overflow-x: hidden;
        }

        /* 頂部設定與進度條 */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: white; border-bottom: 1px solid #eee;
        }
        .progress-bar { width: 0%; height: 4px; background: var(--success); transition: 0.3s; }
        .settings-row {
            display: flex; justify-content: space-around; padding: 12px;
            font-size: 0.85rem; font-weight: bold; color: #7f8c8d;
        }

        header { text-align: center; padding: 80px 0 10px 0; font-weight: bold; font-size: 1.2rem; }

        .app-container { padding: 0 20px; display: flex; flex-direction: column; align-items: center; }

        /* 主卡片樣式 */
        .main-card {
            background: var(--card-bg); border-radius: 30px; width: 100%; max-width: 450px;
            padding: 40px 25px; box-shadow: var(--card-shadow); text-align: center;
            min-height: 300px; display: flex; flex-direction: column; justify-content: center;
        }

        .quiz-question { font-size: 2.8rem; color: var(--primary); font-weight: bold; margin-bottom: 10px; }

        /* 聽力模式大喇叭 */
        .quiz-audio-btn {
            background: #f0f7ff; border: none; width: 80px; height: 80px;
            border-radius: 50%; font-size: 2.5rem; color: var(--primary);
            cursor: pointer; margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center;
        }

        /* 選項按鈕 */
        .option-btn {
            display: block; width: 100%; padding: 18px; margin-bottom: 12px;
            background: white; border: 1px solid #eee; border-radius: 18px;
            font-size: 1.1rem; text-align: left; cursor: pointer; transition: 0.2s;
            padding-left: 25px; color: var(--primary); font-weight: 500;
        }
        .option-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .option-btn.wrong { background: #e74c3c !important; color: white !important; border-color: #e74c3c; }

        /* 切換開關 (Switch) UI */
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; vertical-align: middle; margin-left: 6px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(14px); }

        /* 底部導航欄 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg);
            display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #ddd;
        }
        .nav-item { text-align: center; flex: 1; cursor: pointer; color: #95a5a6; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; display: block; }
        .nav-label { font-size: 0.75rem; font-weight: bold; }

        .next-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .page { display: none; width: 100%; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="progress-bar" id="top-progress"></div>
    <div class="settings-row">
        <span>聽力測驗 <label class="switch"><input type="checkbox" id="toggle-listening" onchange="startNewQuiz()"><span class="slider"></span></label></span>
        <span>隱藏漢字 <label class="switch"><input type="checkbox" id="toggle-hide-kanji" onchange="refreshView()"><span class="slider"></span></label></span>
    </div>
</div>

<header id="page-title">測驗模式</header>

<div class="app-container">
    <div id="page-quiz" class="page active">
        <div class="main-card">
            <div id="quiz-audio-ui" style="display:none">
                <button class="quiz-audio-btn" onclick="playQuizAudio()">🔊</button>
                <div style="color:#95a5a6; font-style:italic; margin-bottom:20px">聽音辨義...</div>
            </div>
            
            <div class="quiz-question" id="quiz-q"></div>
            
            <div id="quiz-options"></div>
            <button id="quiz-next" class="next-btn" style="display:none" onclick="startNewQuiz()">下一題</button>
        </div>
    </div>

    <div id="page-study" class="page">
        <div class="main-card" onclick="flipStudyCard()">
            <div id="study-kana" style="color:#888; font-size:1.2rem; margin-bottom:8px"></div>
            <div id="study-kanji" style="font-size:3rem; font-weight:bold; color:var(--primary)"></div>
            <div id="study-zh" style="display:none; font-size:2.2rem; color:var(--success); margin-top:20px"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px; width:100%; max-width:450px">
            <button class="next-btn" style="background:#bdc3c7" onclick="prevWord()">上一個</button>
            <button class="next-btn" onclick="nextWord()">下一個</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="switchPage('study')"><span class="nav-icon">📚</span><span class="nav-label">學習</span></div>
    <div class="nav-item active" onclick="switchPage('quiz')"><span class="nav-icon">📝</span><span class="nav-label">測驗</span></div>
    <div class="nav-item"><span class="nav-icon">🔍</span><span class="nav-label">列表</span></div>
    <div class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">統計</span></div>
</div>

<script>
    // 預設題庫 (會從 localStorage 讀取)
    let vocabData = JSON.parse(localStorage.getItem('vocab_v_final')) || [
        { kana: "あした", kanji: "明日", zh: "明天" },
        { kana: "あさって", kanji: "明後日", zh: "後天" },
        { kana: "あたま", kanji: "頭", zh: "頭" },
        { kana: "あき", kanji: "秋", zh: "秋天" },
        { kana: "かける", kanji: "", zh: "戴上" }
    ];

    let currentIndex = 0;
    let quizWord = null;
    let jpVoice = null;

    // --- 語音初始化 ---
    function initVoice() {
        const voices = window.speechSynthesis.getVoices();
        jpVoice = voices.find(v => v.lang.includes('ja')) || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = initVoice;

    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        if (jpVoice) u.voice = jpVoice;
        u.lang = 'ja-JP'; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    // --- 測驗邏輯 ---
    function startNewQuiz() {
        const isListening = document.getElementById('toggle-listening').checked;
        const hideKanji = document.getElementById('toggle-hide-kanji').checked;
        
        document.getElementById('quiz-next').style.display = 'none';
        document.getElementById('top-progress').style.width = Math.floor(Math.random() * 100) + "%";

        quizWord = vocabData[Math.floor(Math.random() * vocabData.length)];

        // 題目顯示邏輯
        if (isListening) {
            document.getElementById('quiz-audio-ui').style.display = 'block';
            document.getElementById('quiz-q').style.display = 'none';
            setTimeout(playQuizAudio, 300);
        } else {
            document.getElementById('quiz-audio-ui').style.display = 'none';
            document.getElementById('quiz-q').style.display = 'block';
            // 判斷是否隱藏漢字
            document.getElementById('quiz-q').innerText = (hideKanji || !quizWord.kanji) ? quizWord.kana : quizWord.kanji;
        }

        // 產生選項 (永遠是中文，聽音/看日選中)
        let options = [quizWord.zh];
        while(options.length < 4) {
            let r = vocabData[Math.floor(Math.random() * vocabData.length)].zh;
            if(!options.includes(r)) options.push(r);
        }
        options.sort(() => Math.random() - 0.5);

        const container = document.getElementById('quiz-options');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);
                if(opt === quizWord.zh) btn.classList.add('correct');
                else {
                    btn.classList.add('wrong');
                    btns.forEach(b => { if(b.innerText === quizWord.zh) b.classList.add('correct'); });
                }
                document.getElementById('quiz-next').style.display = 'block';
            };
            container.appendChild(btn);
        });
    }

    function playQuizAudio() { if(quizWord) speak(quizWord.kana); }

    // --- 學習與通用邏輯 ---
    function updateStudyCard() {
        const data = vocabData[currentIndex];
        const hideKanji = document.getElementById('toggle-hide-kanji').checked;
        
        document.getElementById('study-kana').innerText = (data.kanji && !hideKanji) ? data.kana : "";
        document.getElementById('study-kanji').innerText = (hideKanji || !data.kanji) ? data.kana : data.kanji;
        document.getElementById('study-zh').style.display = 'none';
    }

    function flipStudyCard() {
        const zh = document.getElementById('study-zh');
        if(zh.style.display === 'none') {
            zh.innerText = vocabData[currentIndex].zh;
            zh.style.display = 'block';
            speak(vocabData[currentIndex].kana);
        } else { zh.style.display = 'none'; }
    }

    function refreshView() {
        if(document.getElementById('page-quiz').classList.contains('active')) startNewQuiz();
        else updateStudyCard();
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nv => nv.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.querySelector(`.nav-item[onclick="switchPage('${p}')"]`).classList.add('active');
        refreshView();
    }

    function nextWord() { currentIndex = (currentIndex + 1) % vocabData.length; updateStudyCard(); }
    function prevWord() { currentIndex = (currentIndex - 1 + vocabData.length) % vocabData.length; updateStudyCard(); }

    window.onload = () => { initVoice(); startNewQuiz(); };
</script>
</body>
</html>
